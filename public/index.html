<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Random Exercise Picker</title>

<style>
body{ font-family:Arial; padding:20px; background:black; color:white; }
#output{ font-size:1.5em; margin-top:20px; }
button{ padding:10px 15px; margin-top:10px; background:#333; color:white; border:none; cursor:pointer; }
#result{ margin-top:15px; color:#de673d; font-weight:bold; }
</style>

</head>
<body>

<h1>Random Exercise Picker</h1>

<div id="output"></div>

<div>
<input type="radio" name="answer" value="I can do it"> I can do it<br>
<input type="radio" name="answer" value="I can't do it"> I can't do it<br>

<button onclick="submitAnswer()">Submit</button>
</div>

<div id="result"></div>

<script>
const lines = `
30 pushups.
50 situps.
20 pull-ups.
15 dips.
100 squats.
50 lunges with 20 lb dumbbells.
20 burpees.
Plank 1 min.
Side plank 30 sec each side.
30 jumping jacks.
20 mountain climbers.
50 calf raises with 10 lb dumbbells.
15 pike pushups.
30 bicycle crunches.
20 Russian twists with 10 lb plate.
10 chin-ups.
50 leg raises.
30 bicep curls with 25 lb dumbbells.
20 kettlebell swings 35 lb.
15 overhead press 40 lb dumbbells.
20 goblet squats 50 lb kettlebell.
15 front squats 95 lb barbell.
30 sumo squats 40 lb dumbbell.
20 Romanian deadlifts 135 lb barbell.
15 deadlifts 185 lb barbell.
10 bench press 135 lb barbell.
30 hip thrusts 50 lb barbell.
25 overhead presses 60 lb barbell.
`;

const exercises = lines.split("\n").filter(x=>x.trim()!="");
let currentExercise = "";

// Pick one random exercise on page load
function generateExercise(){
    const i = Math.floor(Math.random()*exercises.length);
    currentExercise = exercises[i];
    document.getElementById("output").textContent = currentExercise;
}

generateExercise();

function submitAnswer(){
    const radios = document.getElementsByName("answer");
    let selected = null;
    for(const r of radios){ if(r.checked) selected = r.value; }

    if(!selected){
        document.getElementById("result").textContent = "Select an option.";
        return;
    }

    fetch("/save",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({
            exercise: currentExercise,
            answer: selected
        })
    })
    .then(res=>res.text())
    .then(()=>{
        document.getElementById("result").textContent = "Saved to server CSV.";
    });
}
</script>

</body>
</html>
