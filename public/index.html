<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Strongman AI | Sentiment Analysis</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    #output { margin-top: 20px; font-size: 1.2em; color: #333; }
    button { padding: 10px 15px; font-size: 1em; margin-top: 10px; }
    .radio-group { margin-top: 20px; }
    #result { margin-top: 15px; font-weight: bold; color: #007700; }
  </style>
</head>
<body>
  <h1>Random Exercise Picker</h1>
  <button onclick="showRandomLine()">Get Random Exercise</button>
  <div id="output"></div>

  <div class="radio-group">
    <input type="radio" id="canDo" name="answer" value="I can do it">
    <label for="canDo">I can do it</label><br>
    <input type="radio" id="cantDo" name="answer" value="I can't do it">
    <label for="cantDo">I can't do it</label><br>
    <button onclick="submitAnswer()">Submit</button>
  </div>

`;

    const linesArray = linesString.split('\n').filter(line => line.trim() !== '');

    function showRandomLine() {
      const randomIndex = Math.floor(Math.random() * linesArray.length);
      document.getElementById('output').textContent = linesArray[randomIndex];
      document.getElementById('result').textContent = '';
      const radios = document.getElementsByName('answer');
      radios.forEach(r => r.checked = false);
    }

    function submitAnswer() {
      const radios = document.getElementsByName('answer');
      let selectedValue = null;
      for (const radio of radios) {
        if (radio.checked) selectedValue = radio.value;
      }

      const exercise = document.getElementById('output').textContent;

      if (selectedValue && exercise) {
        // Send data to backend
        fetch('/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ exercise, answer: selectedValue })
        })
        .then(response => response.json())
        .then(data => {
          document.getElementById('result').textContent = 'Response saved!';
          radios.forEach(r => r.checked = false);
        })
        .catch(err => {
          document.getElementById('result').textContent = 'Error saving response.';
          console.error(err);
        });
      } else {
        document.getElementById('result').textContent = 'Please select an option.';
      }
    }
  </script>
</body>
