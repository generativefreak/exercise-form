<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Random Exercise Picker</title>

<style>
body{
  font-family: Arial, sans-serif;
  padding:20px;
  background:black;
  color:white;
  text-align:center;
}

h1{
  margin-bottom:30px;
}

#exercise{
  font-size:2.2em;
  margin:40px 0;
  color:#de673d;
  font-weight:bold;
}

button{
  padding:15px 30px;
  font-size:1.2em;
  margin:10px;
  border:none;
  cursor:pointer;
  border-radius:8px;
  font-weight:bold;
}

#can{
  background:#28a745;
  color:white;
}

#cant{
  background:#dc3545;
  color:white;
}

button:hover{
  opacity:0.85;
}

#log{
  margin-top:30px;
  font-size:1.2em;
  color:#00ffff;
  min-height:25px;
}
</style>
</head>

<body>

<h1>Random Exercise Picker</h1>

<div id="exercise"></div>

<div>
  <button id="can">I can do it</button>
  <button id="cant">I can't do it</button>
</div>

<div id="log"></div>

<script>

// PASTE YOUR FULL EXERCISE LIST HERE
const exercisesText = `
PASTE YOUR ENTIRE EXERCISE LIST HERE
`;

const exercises = exercisesText.split("\n").filter(x => x.trim() !== "");
let currentExercise = "";

// Generate one random exercise
function generateExercise(){
  const i = Math.floor(Math.random() * exercises.length);
  currentExercise = exercises[i];
  document.getElementById("exercise").textContent = currentExercise;
}

generateExercise();

// Submit answer
function submitAnswer(answer){

  fetch("/save",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      exercise: currentExercise,
      answer: answer
    })
  })
  .then(res => res.text())
  .then(() => {
      document.getElementById("log").textContent = "Saved to server CSV!";
      document.getElementById("can").disabled = true;
      document.getElementById("cant").disabled = true;
  })
  .catch(()=>{
      document.getElementById("log").textContent = "Error saving response.";
  });

}

// Button listeners
document.getElementById("can").addEventListener("click", () => submitAnswer("I can do it"));
document.getElementById("cant").addEventListener("click", () => submitAnswer("I can't do it"));

</script>

</body>
</html>
